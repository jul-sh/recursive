name: Prerelease

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install fontTools[lxml,ufo,unicode,woff] "afdko>=3.2.0" "fontmake==2.0.5" \
            defcon cu2qu brotli "fontParts>=0.9.2" "psautohint>=2.0.0" "ttfautohint-py>=0.4.3" \
            ufonormalizer fontPens "ufoProcessor>=1.9" opentype-feature-freezer \
            "designspaceProblems @ git+https://github.com/LettError/designSpaceProblems"

      - name: Build fonts
        working-directory: mastering
        run: uv run python build.py --all --version "0.000" --out "../fonts_build"

      - name: Collect font files
        id: collect
        run: |
          mkdir -p release_assets
          FOUND=""

          # Variable font (TTF)
          for f in fonts_build/Variable_TTF/*.ttf; do
            [ -f "$f" ] && cp "$f" release_assets/ && FOUND="yes"
          done

          # Static OTF
          for f in fonts_build/Static_OTF/*.otf; do
            [ -f "$f" ] && cp "$f" release_assets/ && FOUND="yes"
          done

          # Static TTF
          for f in fonts_build/Static_TTF/*.ttf; do
            [ -f "$f" ] && cp "$f" release_assets/ && FOUND="yes"
          done

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

          echo "== Font files collected =="
          ls -lh release_assets/

      - name: Upload font artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recursive-charon-fonts
          path: release_assets/*
          if-no-files-found: warn

      - name: Create prerelease
        if: steps.collect.outputs.found == 'yes'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="build-${SHORT_SHA}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Build ${SHORT_SHA}" \
            --notes "Automated prerelease from commit ${GITHUB_SHA}" \
            --prerelease \
            release_assets/*
