name: Prerelease

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install fontTools[lxml,ufo,unicode,woff] "afdko>=3.2.0" "fontmake==2.0.5" \
            defcon cu2qu brotli "fontParts>=0.9.2" "psautohint>=2.0.0" "ttfautohint-py>=0.4.3" \
            ufonormalizer fontPens "ufoProcessor>=1.9" opentype-feature-freezer \
            "designspaceProblems @ git+https://github.com/LettError/designSpaceProblems"

      - name: Build fonts
        working-directory: mastering
        run: uv run python build.py --all --version "0.000" --out "../fonts_build"

      - name: Package build artifacts
        id: package
        run: |
          FONTS_DIR="fonts_build"
          if [ ! -d "$FONTS_DIR" ]; then
            echo "No fonts output directory found"
            ls -la
            exit 1
          fi

          echo "== Build output contents =="
          ls -la "$FONTS_DIR"

          FOUND=""

          # Only package Recursive font directories — skip iosevka-charon-*, built-fonts, etc.
          # Static_OTF and Static_TTF are not yet producing fonts, so only Variable_TTF for now.
          for dir_name in Variable_TTF; do
            dir="$FONTS_DIR/$dir_name"
            if [ -d "$dir" ] && find "$dir" -maxdepth 1 \( -name '*.ttf' -o -name '*.otf' \) | grep -q .; then
              zip -r "${dir_name}.zip" "$dir" -x "*/makeotf_output.txt" "*/autohint_output.txt"
              FOUND="yes"
            fi
          done

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

          echo "== Zip files =="
          ls -lh *.zip 2>/dev/null || echo "No zips created"

      - name: Upload font artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recursive-charon-fonts
          path: "*.zip"
          if-no-files-found: warn

      - name: Create prerelease
        if: steps.package.outputs.found == 'yes'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="build-${SHORT_SHA}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Build ${SHORT_SHA}" \
            --notes "Automated prerelease from commit ${GITHUB_SHA}" \
            --prerelease \
            ./*.zip
