name: Prerelease

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.10
          uv pip install fontTools[lxml,ufo,unicode,woff] "afdko>=3.2.0" "fontmake==2.0.5" \
            defcon cu2qu brotli "fontParts>=0.9.2" "psautohint>=2.0.0" "ttfautohint-py>=0.4.3" \
            ufonormalizer fontPens "ufoProcessor>=1.9" opentype-feature-freezer \
            "designspaceProblems @ git+https://github.com/LettError/designSpaceProblems"

      - name: Build fonts
        working-directory: mastering
        run: uv run python build.py --all --version "${{ github.sha }}"

      - name: Package build artifacts
        run: |
          VERSION="fonts_${{ github.sha }}"
          if [ -d "$VERSION" ]; then
            FONTS_DIR="$VERSION"
          else
            FONTS_DIR=$(ls -d fonts_* 2>/dev/null | head -1)
          fi
          if [ -z "$FONTS_DIR" ]; then
            echo "No fonts output directory found"
            ls -la
            exit 1
          fi
          cd "$FONTS_DIR"
          for dir in Variable_TTF Static_OTF Static_TTF; do
            if [ -d "$dir" ]; then
              zip -r "../${dir}.zip" "$dir"
            fi
          done

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="build-${SHORT_SHA}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Build ${SHORT_SHA}" \
            --notes "Automated prerelease from commit ${GITHUB_SHA}" \
            --prerelease \
            ./*.zip
